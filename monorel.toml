# monorel configuration for loglayer-go.
# See https://monorel.disaresta.com/configuration for the schema.
#
# Layout: bare vX.Y.Z tags for the root module (go.loglayer.dev),
# <path>/vX.Y.Z tags for every sub-module.

[forge]
provider = "github"
owner    = "loglayer"
repo     = "loglayer-go"

[packages."go.loglayer.dev"]
tag_prefix = ""
path       = "."
changelog  = "CHANGELOG.md"

[packages."transports/charmlog"]
tag_prefix = "transports/charmlog"
path       = "transports/charmlog"
changelog  = "transports/charmlog/CHANGELOG.md"

