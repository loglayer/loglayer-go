# Git hooks managed by lefthook (https://github.com/evilmartians/lefthook).
# Install once with: lefthook install
#
# Hooks run automatically on `git commit` (pre-commit) and `git push`
# (pre-push). Skip a hook for a single command with --no-verify.

commit-msg:
  commands:
    # Lint the commit message with @conventional-commits/parser. Catches
    # typo'd types and body-parse errors the PR-title workflow can't see
    # (which only checks the title). Releases are driven by changesets,
    # not commit messages — this lint is for git-history hygiene.
    #
    # Missing tooling is a hard fail: the local hook only matters if it
    # actually runs, and a silent skip ships "works on my machine"
    # commits that fail in CI on someone else's box. Bypass per-commit
    # with --no-verify if you genuinely need to.
    conventional-commits:
      run: |
        if ! command -v bun >/dev/null 2>&1; then
          echo "lefthook: bun not on PATH. Install bun (https://bun.sh) or skip with: git commit --no-verify" >&2
          exit 1
        fi
        if [ ! -d node_modules ]; then
          echo "lefthook: node_modules missing. Run 'bun install' or skip with: git commit --no-verify" >&2
          exit 1
        fi
        bun scripts/lint-commit.mjs --edit {1}

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      # Format in place and re-stage any fixes so the commit picks them up.
      # Lefthook re-adds modified files to the index when stage_fixed: true.
      run: gofmt -w {staged_files}
      stage_fixed: true
    vet:
      glob: "*.go"
      run: go vet ./...
    # Mirror what CI runs so a clean pre-commit means a clean CI run.
    # Hard-fails if staticcheck isn't installed: the lint should actually
    # run before the commit lands, not be deferred to CI on a clone where
    # the tool happens to be missing. Bypass per-commit with --no-verify.
    staticcheck:
      glob: "*.go"
      run: |
        if ! command -v staticcheck >/dev/null 2>&1; then
          echo "staticcheck not on PATH. Install with: go install honnef.co/go/tools/cmd/staticcheck@latest" >&2
          echo "Or skip this commit with: git commit --no-verify" >&2
          exit 1
        fi
        staticcheck ./...
    # Keep the README's auto-generated TOC in sync. Same pattern as the
    # gofmt step: regenerate, re-stage, don't fail. doctoc is a no-op when
    # the TOC is already current.
    doctoc:
      glob: "README.md"
      run: |
        if ! command -v bun >/dev/null 2>&1; then
          echo "lefthook: bun not on PATH. Install bun (https://bun.sh) or skip with: git commit --no-verify" >&2
          exit 1
        fi
        if [ ! -d node_modules ]; then
          echo "lefthook: node_modules missing. Run 'bun install' or skip with: git commit --no-verify" >&2
          exit 1
        fi
        bun run toc
      stage_fixed: true

pre-push:
  commands:
    # Catches go.mod / go.sum drift before the push reaches CI. CI
    # runs the same check; this just shifts the failure left so devs
    # don't push, fail, fix, push again per drifted module.
    tidy:
      run: scripts/foreach-module.sh tidy
    # Tests every module (main + sub-modules) so a clean pre-push
    # mirrors what CI will see. The shared script lives under scripts/
    # so devs can also run `scripts/foreach-module.sh test` (or any
    # other op) directly when iterating.
    test-race:
      run: scripts/foreach-module.sh test
