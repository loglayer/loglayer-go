# Git hooks managed by lefthook (https://github.com/evilmartians/lefthook).
# Install once with: lefthook install
#
# Hooks run automatically on `git commit` (pre-commit) and `git push`
# (pre-push). Skip a hook for a single command with --no-verify.

commit-msg:
  commands:
    # Lint the commit message with the same parser release-please uses
    # (@conventional-commits/parser). Catches body-parse errors that the
    # PR-title workflow can't see (which only checks the title). If bun
    # isn't installed or deps are missing, the script can't run; we
    # exit 0 with a hint rather than blocking commits — CI will catch
    # it regardless.
    conventional-commits:
      run: |
        if ! command -v bun >/dev/null 2>&1; then
          echo "lefthook: bun not on PATH; skipping commit-msg lint (CI will catch any issues). Install bun: https://bun.sh" >&2
          exit 0
        fi
        if [ ! -d node_modules ]; then
          echo "lefthook: node_modules missing; run 'bun install' to enable the commit-msg lint locally (CI will catch any issues)." >&2
          exit 0
        fi
        bun scripts/lint-commit.mjs --edit {1}

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      # Format in place and re-stage any fixes so the commit picks them up.
      # Lefthook re-adds modified files to the index when stage_fixed: true.
      run: gofmt -w {staged_files}
      stage_fixed: true
    vet:
      glob: "*.go"
      run: go vet ./...
    # Mirror what CI runs so a clean pre-commit means a clean CI run.
    # Install once: go install honnef.co/go/tools/cmd/staticcheck@latest
    # If staticcheck isn't on PATH, this hook prints a hint and skips
    # rather than failing — CI will catch any issue regardless.
    staticcheck:
      glob: "*.go"
      run: |
        if ! command -v staticcheck >/dev/null 2>&1; then
          echo "staticcheck not found on PATH; skipping (install: go install honnef.co/go/tools/cmd/staticcheck@latest)"
          exit 0
        fi
        staticcheck ./...

pre-push:
  commands:
    # Catches go.mod / go.sum drift before the push reaches CI. CI
    # runs the same check; this just shifts the failure left so devs
    # don't push, fail, fix, push again per drifted module.
    tidy:
      run: scripts/foreach-module.sh tidy
    # Tests every module (main + sub-modules) so a clean pre-push
    # mirrors what CI will see. The shared script lives under scripts/
    # so devs can also run `scripts/foreach-module.sh test` (or any
    # other op) directly when iterating.
    test-race:
      run: scripts/foreach-module.sh test
