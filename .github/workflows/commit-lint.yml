name: Commit Lint

# Lints every commit message with @conventional-commits/parser. This
# is a hygiene check: catches typo'd types (e.g. `feaT:`), missing
# colons, and bodies the parser can't handle (e.g. a backtick-wrapped
# function signature with parens). Releases are driven by changesets
# in monorel, not commit messages, so a malformed message no longer
# silently swallows a release; this lint stands on its own as a
# git-history-quality tool.
#
# Local pre-commit equivalent: lefthook's `commit-msg` hook runs the
# same script on the message you're about to commit.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so we can compute the commit range.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            # github.event.before is all-zeros on a first push, and after a
            # force-push it points at an orphaned SHA that's no longer in
            # the repo (so `git log BEFORE..HEAD` fails with "Invalid
            # revision range"). Fall back to HEAD~1 in either case.
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              echo "from=HEAD~1" >> "$GITHUB_OUTPUT"
            else
              echo "from=$BEFORE" >> "$GITHUB_OUTPUT"
            fi
            echo "to=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint commit messages
        run: |
          bun scripts/lint-commit.mjs \
            --range "${{ steps.range.outputs.from }}..${{ steps.range.outputs.to }}"
