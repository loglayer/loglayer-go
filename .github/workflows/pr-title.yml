name: PR Title

# Validates that the PR title follows Conventional Commits, since that's
# what AGENTS.md mandates for the commit-message style and what
# Release Please uses to derive the next version. Allowed types are
# the same set documented in AGENTS.md "Versioning and Changelog".

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            ci
          # Scopes are encouraged (e.g. feat(plugins): ...) but not
          # required, since changes to the core have no obvious scope.
          requireScope: false
