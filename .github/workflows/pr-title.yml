name: PR Title

# Validates that the PR title follows Conventional Commits, since that's
# what AGENTS.md mandates for commit-message style. Releases are driven
# by changesets in monorel (not by PR titles), so this check is purely
# a hygiene gate on the merged commit's subject line. Allowed types are
# the same set documented in AGENTS.md "Versioning and Changelog".

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            refactor
            deps
            docs
            chore
            style
            test
            build
            ci
          # Scopes are encouraged (e.g. feat(plugins): ...) but not
          # required, since changes to the core have no obvious scope.
          requireScope: false
