name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'transports/*/v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify build
        run: go build ./...

      - name: Extract release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Locate the section in CHANGELOG.md by exact-string match. Section
          # format: "## [TAG]" ... up to the next "## [" heading. Tag is passed
          # via env to avoid shell-injection and bracket-escaping issues.
          if grep -Fq "## [$TAG]" CHANGELOG.md; then
            awk -v target="## [$TAG]" '
              index($0, target) == 1 { flag = 1; next }
              /^## \[/             { flag = 0 }
              flag
            ' CHANGELOG.md > release-notes.md
          else
            echo "Release $TAG" > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
