name: release-pr

# Maintains the always-open release PR. Fires on every push to main
# except the chore(release): merge commit (which is the merge of the
# release PR itself; reprocessing it would churn the just-merged PR).
#
# The PR aggregates pending .changeset/*.md files into a rendered plan
# and updates / opens / closes itself based on whether any changesets
# remain after each push.
#
# Drives every release end-to-end together with release.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    # Skip on the release PR's own merge commit. Heuristic: subject
    # begins with "chore(release):" by monorel-bot convention. If a
    # human ever authors a hand-titled "chore(release):" commit, the
    # workflow will skip there too — switch to filtering by
    # github.event.head_commit.author.username == 'monorel-bot[automation]'
    # if that becomes a problem.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The monorel CI action runs `go mod tidy` per sub-module with
      # GOPROXY=off, so it can only resolve modules already in the local
      # cache. Sub-modules also require Go 1.25, which the runner default
      # doesn't supply. Install Go 1.25 with caching enabled, then prime
      # the module cache via `go mod download` per module so monorel's
      # GOPROXY=off tidy can find every transitive dep.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Prime module cache for monorel tidy
        run: |
          set -euo pipefail
          while IFS= read -r mod; do
            (cd "$(dirname "$mod")" && go mod download)
          done < <(find . -name go.mod -not -path './.git/*' | sort)

      - uses: disaresta-org/monorel/ci/github@v0.11.0
        with:
          command: pr
